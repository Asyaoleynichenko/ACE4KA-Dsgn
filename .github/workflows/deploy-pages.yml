# Публикует содержимое dist/ на GitHub Pages.
# В репозитории: Settings → Pages → Build and deployment → Source: «GitHub Actions» (не «Deploy from a branch» с корнем main — там лежит dev index.html без сборки).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      # Имя репозитория = сегмент пути GitHub Pages (…/github.io/<имя>/). Иначе при другом slug в vite.config локальная сборка и CI расходятся — белый экран (404 на /assets).
      - run: npm run build
        env:
          VITE_BASE: ${{ github.event.repository.name }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
